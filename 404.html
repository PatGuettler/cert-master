<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var l = window.location;
        var path = l.pathname;
        if (!path || path === "/" || path === "/index.html") {
          l.replace(l.origin + "/");
          return;
        }
        var rest = path.replace(/^\//, "").replace(/&/g, "~and~");
        var q = l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "";
        l.replace(l.origin + "/?p=/" + rest + q + l.hash);
      })();
    </script>
  </head>
  <body></body>
</html>
