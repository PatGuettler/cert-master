<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var segmentCount = 1;
        var l = window.location;
        var repo = l.pathname.split("/").slice(0, 1 + segmentCount).join("/") + "/";
        var rest = l.pathname
          .split("/")
          .slice(1 + segmentCount)
          .join("/")
          .replace(/&/g, "~and~");
        var q = l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "";
        l.replace(repo + "?p=/" + rest + q + l.hash);
      })();
    </script>
  </head>
  <body></body>
</html>
