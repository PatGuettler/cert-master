name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build exam index and SEO question pages
        run: |
          python3 scripts/build-exams-index.py
          if [ -f scripts/generate_comptia_exams.py ]; then
            python3 scripts/generate_comptia_exams.py || true
          fi
          python3 scripts/build-question-pages.py
        env:
          SITE_ORIGIN: https://patguettler.github.io
          SITE_PATH: /aws-cert-master

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
